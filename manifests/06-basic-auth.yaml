# USE CASE 6: Basic authentication (WAF-lite / access control).
# The controller enforces HTTP Basic Auth using the htpasswd data in the
# `basic-auth` Secret (created by the Ansible basic_auth role).
#   http://auth.example.com -> app1  (401 without creds, 200 with)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: basic-auth
  namespace: apps
  annotations:
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
spec:
  ingressClassName: nginx
  rules:
    - host: auth.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app1
                port:
                  number: 80
