# USE CASE 4: URL rewrite.
# Strip a path prefix before forwarding. A request to
#   http://rewrite.example.com/svc/foo
# is rewritten to /foo at the backend (whoami echoes the path it received).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rewrite-app
  namespace: apps
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: rewrite.example.com
      http:
        paths:
          - path: /svc(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: app1
                port:
                  number: 80
